<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NECaptcha 3x Token Farmer</title>
<script src="https://cstaticdun.126.net/load.min.js"></script>
<style>
    body {
        font-family: monospace;
        margin: 0;
        padding: 0;
        height: 100vh;
        background-color: var(--bg);
        color: var(--fg);
        transition: all 0.3s ease-in-out;
        display: flex;
        flex-direction: column;
    }
    :root {
        --bg: #121212;
        --fg: #e0e0e0;
        --accent: #00ff9d;
    }
    .light {
        --bg: #f4f4f4;
        --fg: #222;
        --accent: #0077ff;
    }
    h3 {
        text-align: center;
        padding: 10px;
    }
    .captcha-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #console {
        background: rgba(0,0,0,0.8);
        padding: 10px;
        overflow-y: auto;
        height: 150px;
        border-top: 2px solid var(--accent);
        font-size: 14px;
        color: var(--accent);
    }
    .footer {
        padding: 5px;
        display: flex;
        justify-content: space-between;
        background: var(--bg);
    }
    button {
        background: var(--accent);
        border: none;
        padding: 5px 10px;
        color: white;
        cursor: pointer;
        border-radius: 5px;
    }
    .fade-in {
        animation: fade 0.5s ease-in-out;
    }
    @keyframes fade {
        from {opacity: 0;}
        to {opacity: 1;}
    }
</style>
</head>
<body>
<h3>NECaptcha Token Farming</h3>

<div class="captcha-container"><div id="captcha1"></div></div>
<div class="captcha-container"><div id="captcha2"></div></div>
<div class="captcha-container"><div id="captcha3"></div></div>

<div id="console"></div>

<div class="footer">
    <span>Tokens sent to server. Latest at <code>/get_token?server=yourServer</code></span>
    <button id="themeBtn">Toggle Theme</button>
</div>

<script>
const serverName = prompt("Enter server name:", "default") || "default";
const captchaKey = "fef5c67c39074e9d845f4bf579cc07af";
let theme = "dark";

function logMessage(msg) {
    const consoleDiv = document.getElementById("console");
    const line = document.createElement("div");
    line.className = "fade-in";
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    consoleDiv.appendChild(line);
    consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

function sendToken(token) {
    fetch("/push_token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, server: serverName })
    }).then(() => {
        navigator.clipboard.writeText(token).catch(() => {});
        logMessage(`Token sent & copied: ${token}`);
    });
}

function loadCaptcha(captchaId, elementId) {
    initNECaptcha({
        captchaId: captchaId,
        element: elementId,
        mode: "embed",
        onVerify: function (err, data) {
            if (!err) {
                sendToken(data.validate);
                loadCaptcha(captchaId, elementId);
            }
        }
    });
}

document.getElementById("themeBtn").addEventListener("click", () => {
    if (theme === "dark") {
        document.body.classList.add("light");
        theme = "light";
    } else {
        document.body.classList.remove("light");
        theme = "dark";
    }
});

loadCaptcha(captchaKey, "#captcha1");
loadCaptcha(captchaKey, "#captcha2");
loadCaptcha(captchaKey, "#captcha3");
</script>
</body>
</html>
